<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>domhunt — find your project domain in one search</title>
    <meta
      name="description"
      content="Check if your project name is available across .com, .io, .dev, .app, .ai and more — all at once, free, no signup, no install."
    />
    <meta property="og:title" content="domhunt — find your project domain in one search" />
    <meta
      property="og:description"
      content="Check if your project name is available across .com, .io, .dev, .app, .ai and more — all at once, free, no signup."
    />
    <meta name="twitter:card" content="summary" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%F0%9F%8F%B9%3C/text%3E%3C/svg%3E" />
    <style>
      :root {
        --bg-0: #07090f;
        --bg-1: #0c1019;
        --panel: rgba(255, 255, 255, 0.035);
        --panel-2: rgba(255, 255, 255, 0.06);
        --border: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(255, 255, 255, 0.16);
        --text: #e8ecf1;
        --muted: #9aa3b2;
        --faint: #6b7280;
        --accent: #818cf8;
        --accent-2: #ec4899;
        --accent-3: #38bdf8;
        --green: #34d399;
        --red: #f87171;
        --yellow: #fbbf24;
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg-0);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        line-height: 1.55;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }

      /* Animated mesh gradient backdrop */
      body::before {
        content: "";
        position: fixed;
        inset: -20vmax;
        z-index: -2;
        background:
          radial-gradient(45vmax 45vmax at 18% 12%, rgba(99, 102, 241, 0.35), transparent 60%),
          radial-gradient(40vmax 40vmax at 88% 88%, rgba(236, 72, 153, 0.25), transparent 60%),
          radial-gradient(35vmax 35vmax at 72% 18%, rgba(56, 189, 248, 0.18), transparent 60%),
          radial-gradient(30vmax 30vmax at 10% 80%, rgba(168, 85, 247, 0.18), transparent 60%);
        filter: blur(30px) saturate(1.1);
        animation: drift 28s ease-in-out infinite alternate;
        will-change: transform;
      }
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        background:
          linear-gradient(180deg, rgba(7, 9, 15, 0) 0%, var(--bg-0) 80%),
          repeating-linear-gradient(0deg, transparent 0 2px, rgba(255, 255, 255, 0.015) 2px 3px);
        pointer-events: none;
      }
      @keyframes drift {
        0%   { transform: translate3d(0, 0, 0) scale(1) rotate(0deg); }
        50%  { transform: translate3d(-2%, 1%, 0) scale(1.05) rotate(2deg); }
        100% { transform: translate3d(2%, -2%, 0) scale(1.08) rotate(-1deg); }
      }

      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 56px 20px 96px;
        position: relative;
      }

      header { text-align: center; margin-bottom: 36px; animation: fadeUp 0.7s 0.05s ease-out both; }
      h1 {
        font-size: clamp(2.4rem, 6vw, 3.6rem);
        margin: 0 0 10px;
        letter-spacing: -0.025em;
        font-weight: 700;
        background: linear-gradient(100deg, #ffffff 0%, #dbeafe 40%, #fbcfe8 70%, #ffffff 100%);
        background-size: 200% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: shine 8s linear infinite;
      }
      h1 .arrow {
        display: inline-block;
        margin-right: 4px;
        font-size: 0.85em;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: aim 3.6s ease-in-out infinite;
      }
      @keyframes shine {
        0%   { background-position: 0% 0; }
        100% { background-position: 200% 0; }
      }
      @keyframes aim {
        0%, 100% { transform: translateX(0); }
        50%      { transform: translateX(4px); }
      }
      .tagline {
        color: var(--muted);
        margin: 0;
        font-size: 1.05rem;
        max-width: 540px;
        margin-left: auto;
        margin-right: auto;
        animation: fadeUp 0.7s 0.15s ease-out both;
      }

      form {
        display: flex;
        gap: 8px;
        background: var(--panel);
        backdrop-filter: blur(22px) saturate(1.3);
        -webkit-backdrop-filter: blur(22px) saturate(1.3);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 8px;
        margin-bottom: 18px;
        position: relative;
        transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
        animation: fadeUp 0.7s 0.25s ease-out both;
      }
      form::before {
        content: "";
        position: absolute;
        inset: -1px;
        border-radius: 17px;
        padding: 1px;
        background: linear-gradient(135deg, transparent 30%, rgba(129, 140, 248, 0.6), rgba(236, 72, 153, 0.4), transparent 70%);
        -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
        -webkit-mask-composite: xor;
                mask-composite: exclude;
        opacity: 0;
        transition: opacity 0.3s ease;
        pointer-events: none;
      }
      form:focus-within::before { opacity: 1; }
      form:focus-within {
        border-color: transparent;
        box-shadow:
          0 0 0 4px rgba(129, 140, 248, 0.08),
          0 14px 40px -10px rgba(129, 140, 248, 0.35);
      }

      input[type="text"] {
        flex: 1;
        background: transparent;
        border: 0;
        color: var(--text);
        font-size: 1.1rem;
        padding: 14px 16px;
        outline: none;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: 0.01em;
      }
      input[type="text"]::placeholder { color: var(--faint); transition: color 0.2s ease; }
      input[type="text"]:focus::placeholder { color: var(--muted); }

      button {
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
        color: #fff;
        border: 0;
        border-radius: 10px;
        padding: 0 24px;
        font-size: 0.98rem;
        font-weight: 600;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: transform 0.15s ease, filter 0.2s ease, box-shadow 0.25s ease;
        box-shadow: 0 6px 18px -6px rgba(129, 140, 248, 0.55);
        letter-spacing: 0.01em;
        min-width: 110px;
      }
      button::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(120deg, transparent 35%, rgba(255, 255, 255, 0.35) 50%, transparent 65%);
        transform: translateX(-120%);
        transition: transform 0.7s ease;
      }
      button:hover:not(:disabled) {
        transform: translateY(-1px);
        filter: brightness(1.08);
        box-shadow: 0 10px 28px -8px rgba(129, 140, 248, 0.7);
      }
      button:hover:not(:disabled)::after { transform: translateX(120%); }
      button:active:not(:disabled) { transform: translateY(0); }
      button:disabled { opacity: 0.65; cursor: wait; }

      .controls {
        display: flex;
        gap: 18px;
        align-items: center;
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 28px;
        flex-wrap: wrap;
        justify-content: center;
        animation: fadeUp 0.7s 0.35s ease-out both;
      }
      .controls label {
        cursor: pointer;
        user-select: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: color 0.2s ease;
      }
      .controls label:hover { color: var(--text); }
      .controls input[type="checkbox"] {
        appearance: none;
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        border: 1px solid var(--border-strong);
        border-radius: 4px;
        background: var(--panel);
        cursor: pointer;
        position: relative;
        transition: all 0.2s ease;
      }
      .controls input[type="checkbox"]:checked {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        border-color: transparent;
      }
      .controls input[type="checkbox"]:checked::after {
        content: "";
        position: absolute;
        left: 4px;
        top: 1px;
        width: 5px;
        height: 9px;
        border: solid #fff;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
      }
      .controls select {
        background: var(--panel);
        backdrop-filter: blur(10px);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 0.88rem;
        cursor: pointer;
        transition: border-color 0.2s ease, background 0.2s ease;
      }
      .controls select:hover, .controls select:focus {
        border-color: var(--border-strong);
        outline: none;
      }

      #status {
        text-align: center;
        color: var(--muted);
        min-height: 1.5em;
        margin-bottom: 8px;
        font-size: 0.92rem;
      }
      #status .dot-loader {
        display: inline-block;
        margin-left: 6px;
      }
      #status .dot-loader span {
        display: inline-block;
        width: 4px;
        height: 4px;
        margin: 0 2px;
        background: currentColor;
        border-radius: 50%;
        animation: bounce 1.2s ease-in-out infinite both;
      }
      #status .dot-loader span:nth-child(2) { animation-delay: 0.15s; }
      #status .dot-loader span:nth-child(3) { animation-delay: 0.3s; }
      @keyframes bounce {
        0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
        40%           { opacity: 1;   transform: translateY(-4px); }
      }

      #summary {
        text-align: center;
        margin-bottom: 18px;
        color: var(--muted);
        font-size: 1rem;
        opacity: 0;
        transition: opacity 0.4s ease;
      }
      #summary.show { opacity: 1; }
      #summary .count {
        font-weight: 700;
        font-size: 1.15rem;
        background: linear-gradient(135deg, var(--green), #4ade80);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      #summary .count.zero {
        background: linear-gradient(135deg, var(--red), #fb7185);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      #summary .total { color: var(--text); font-weight: 600; }

      .section-title {
        margin: 40px 0 12px;
        font-size: 0.82rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .section-title::before, .section-title::after {
        content: "";
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--border), transparent);
      }

      .table-wrap {
        background: var(--panel);
        backdrop-filter: blur(22px) saturate(1.3);
        -webkit-backdrop-filter: blur(22px) saturate(1.3);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        animation: tableIn 0.4s ease-out both;
      }
      @keyframes tableIn {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        text-align: left;
        padding: 13px 18px;
        border-bottom: 1px solid var(--border);
        font-size: 0.95rem;
      }
      th {
        background: rgba(255, 255, 255, 0.025);
        color: var(--muted);
        font-weight: 600;
        font-size: 0.74rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      tr:last-child td { border-bottom: 0; }
      tbody tr {
        transition: background 0.2s ease;
        animation: rowIn 0.4s ease-out both;
        animation-delay: calc(var(--i, 0) * 40ms);
      }
      tbody tr:hover { background: rgba(255, 255, 255, 0.025); }
      @keyframes rowIn {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      td.domain {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.95rem;
        letter-spacing: 0.01em;
      }
      td.domain .tld { color: var(--muted); }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 11px;
        border-radius: 999px;
        font-size: 0.74rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .badge .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
      }
      .badge.available {
        background: rgba(52, 211, 153, 0.12);
        color: var(--green);
        border: 1px solid rgba(52, 211, 153, 0.28);
      }
      .badge.available .dot {
        box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.6);
        animation: pulse 2.2s ease-out infinite;
      }
      .badge.taken {
        background: rgba(248, 113, 113, 0.1);
        color: var(--red);
        border: 1px solid rgba(248, 113, 113, 0.22);
      }
      .badge.unknown {
        background: rgba(251, 191, 36, 0.1);
        color: var(--yellow);
        border: 1px solid rgba(251, 191, 36, 0.22);
      }
      @keyframes pulse {
        0%   { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.6); }
        70%  { box-shadow: 0 0 0 6px rgba(52, 211, 153, 0); }
        100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
      }

      td.price { color: var(--muted); white-space: nowrap; font-variant-numeric: tabular-nums; }
      td.buy { text-align: right; }
      td.buy a {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #fff;
        border-radius: 8px;
        padding: 5px 12px;
        font-size: 0.82rem;
        font-weight: 600;
        text-decoration: none;
        white-space: nowrap;
        display: inline-block;
        position: relative;
        overflow: hidden;
        transition: transform 0.15s ease, box-shadow 0.2s ease;
        box-shadow: 0 4px 14px -4px rgba(129, 140, 248, 0.5);
      }
      td.buy a::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(120deg, transparent 35%, rgba(255, 255, 255, 0.4) 50%, transparent 65%);
        transform: translateX(-120%);
        transition: transform 0.6s ease;
      }
      td.buy a:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 22px -6px rgba(129, 140, 248, 0.7);
      }
      td.buy a:hover::after { transform: translateX(120%); }

      /* Skeleton rows during loading */
      .skel-row td {
        padding: 14px 18px;
      }
      .skel {
        height: 14px;
        border-radius: 4px;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.04) 0%,
          rgba(255, 255, 255, 0.1) 50%,
          rgba(255, 255, 255, 0.04) 100%
        );
        background-size: 200% 100%;
        animation: shimmer 1.4s linear infinite;
      }
      .skel.w-domain { width: 70%; }
      .skel.w-badge  { width: 60px; height: 22px; border-radius: 999px; }
      .skel.w-price  { width: 50px; }
      .skel.w-btn    { width: 50px; height: 22px; border-radius: 6px; margin-left: auto; }
      @keyframes shimmer {
        0%   { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      .error {
        color: var(--red);
        text-align: center;
        padding: 14px;
        background: rgba(248, 113, 113, 0.06);
        border: 1px solid rgba(248, 113, 113, 0.2);
        border-radius: 10px;
      }

      .empty {
        text-align: center;
        color: var(--muted);
        padding: 24px;
        background: var(--panel);
        border: 1px dashed var(--border-strong);
        border-radius: 12px;
        font-size: 0.95rem;
      }

      footer {
        text-align: center;
        margin-top: 72px;
        color: var(--faint);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--muted);
        text-decoration: none;
        transition: color 0.2s ease;
      }
      footer a:hover { color: var(--accent); }
      footer .sep { margin: 0 8px; opacity: 0.5; }

      @media (max-width: 560px) {
        main { padding: 36px 14px 64px; }
        form { flex-direction: column; }
        button { padding: 12px 24px; width: 100%; }
        th, td { padding: 11px 12px; font-size: 0.88rem; }
        th:nth-child(3), td.price { display: none; }
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
        }
        body::before { animation: none; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1><span class="arrow">›</span>domhunt</h1>
        <p class="tagline">Check your project name across every TLD that matters &mdash; in one search.</p>
      </header>

      <form id="form" autocomplete="off">
        <input
          id="name"
          type="text"
          placeholder="e.g. acme"
          autofocus
          required
          pattern="[A-Za-z0-9-]+"
          maxlength="63"
          spellcheck="false"
          autocapitalize="off"
        />
        <button type="submit" id="submit">Search</button>
      </form>

      <div class="controls">
        <label><input type="checkbox" id="availableOnly" /> Show only available</label>
        <label>
          TLD set:
          <select id="tldset">
            <option value="default" selected>Default (12)</option>
            <option value="all">Extended (~30)</option>
          </select>
        </label>
      </div>

      <div id="status" aria-live="polite"></div>
      <div id="summary"></div>
      <div id="results"></div>
      <div id="suggestions"></div>

      <footer>
        Free &amp; open source. No tracking, no ads, no signup. Prices are approximate Porkbun retail.
        <span class="sep">&middot;</span>
        <a href="https://github.com/syntaxixr/domhunt" target="_blank" rel="noopener">GitHub</a>
        <span class="sep">&middot;</span>
        <a href="https://github.com/syntaxixr/domhunt#cli-usage" target="_blank" rel="noopener">CLI version</a>
      </footer>
    </main>

    <script>
      // Curated TLDs and approximate Porkbun retail prices (USD/year).
      // Duplicated from src/domhunt/{tlds.py, prices.py} so this page is fully
      // self-contained for static hosting on GitHub Pages.
      const DEFAULT_TLDS = ["com","io","dev","app","ai","co","net","org","me","xyz","sh","fm"];
      const EXTENDED_TLDS = DEFAULT_TLDS.concat([
        "tech","tools","studio","design","blog","site","shop","store",
        "online","cloud","page","link","click","info","biz","us","uk","eu","de","fr"
      ]);
      const PRICES = {
        com: 10, net: 12, org: 11, io: 38, dev: 15, app: 14, ai: 70, co: 26,
        me: 17, xyz: 2, sh: 80, fm: 110, tech: 5, tools: 22, studio: 21,
        design: 35, blog: 21, site: 4, shop: 4, store: 5, online: 2, cloud: 9,
        page: 8, link: 9, click: 6, info: 4, biz: 17, us: 9, uk: 8, eu: 9,
        de: 7, fr: 9
      };
      const PREFIXES = ["get","try","use","my","the","go"];
      const SUFFIXES = ["app","hq","hub","labs","io","ly"];
      const RDAP_GATEWAY = "https://rdap.org/domain/";
      const CONCURRENCY = 8;
      const TIMEOUT_MS = 8000;

      const priceFor = (tld) => PRICES[tld] ?? null;
      const porkbunUrl = (domain) => `https://porkbun.com/checkout/search?q=${domain}`;

      function variations(name, limit = 12) {
        name = name.replace(/^-+|-+$/g, "").toLowerCase();
        if (!name) return [];
        const seen = new Set([name]);
        const out = [];
        const add = (c) => {
          c = c.replace(/^-+|-+$/g, "");
          if (c && !seen.has(c)) { seen.add(c); out.push(c); }
        };
        for (const s of SUFFIXES) add(name + s);
        for (const s of SUFFIXES) add(name + "-" + s);
        for (const p of PREFIXES) add(p + name);
        for (const p of PREFIXES) add(p + "-" + name);
        return out.slice(0, limit);
      }

      const form = document.getElementById("form");
      const nameInput = document.getElementById("name");
      const tldSelect = document.getElementById("tldset");
      const availableOnly = document.getElementById("availableOnly");
      const submitBtn = document.getElementById("submit");
      const statusEl = document.getElementById("status");
      const summaryEl = document.getElementById("summary");
      const resultsEl = document.getElementById("results");
      const suggestionsEl = document.getElementById("suggestions");

      let lastResults = null;
      let activeRunId = 0;

      function classify(status) {
        if (status === 200) return { status: "taken", detail: "" };
        if (status === 404) return { status: "available", detail: "" };
        if (status === 400) return { status: "unknown", detail: "TLD has no RDAP server" };
        return { status: "unknown", detail: `HTTP ${status}` };
      }

      async function checkOne(domain) {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), TIMEOUT_MS);
        try {
          const resp = await fetch(RDAP_GATEWAY + domain, {
            method: "GET",
            redirect: "follow",
            signal: ctrl.signal,
          });
          const c = classify(resp.status);
          const tld = domain.split(".").pop();
          return { domain, ...c, price_usd: priceFor(tld), buy_url: porkbunUrl(domain) };
        } catch (err) {
          const reason = err.name === "AbortError" ? "timeout" : "network error";
          const tld = domain.split(".").pop();
          return { domain, status: "unknown", detail: reason, price_usd: priceFor(tld), buy_url: porkbunUrl(domain) };
        } finally {
          clearTimeout(timer);
        }
      }

      async function checkDomains(domains) {
        const results = new Array(domains.length);
        let next = 0;
        async function worker() {
          while (next < domains.length) {
            const i = next++;
            results[i] = await checkOne(domains[i]);
          }
        }
        const workers = Array.from({ length: Math.min(CONCURRENCY, domains.length) }, worker);
        await Promise.all(workers);
        return results;
      }

      const labels = { available: "available", taken: "taken", unknown: "unknown" };

      function splitDomain(d) {
        const i = d.indexOf(".");
        if (i < 0) return [d, ""];
        return [d.slice(0, i), d.slice(i)];
      }

      function rowHtml(r, i) {
        const [base, tld] = splitDomain(r.domain);
        const label = labels[r.status] || r.status;
        const price = r.price_usd != null ? `$${r.price_usd}<span style="opacity:.5">/yr</span>` : "&mdash;";
        const buy = r.status === "available"
          ? `<a href="${r.buy_url}" target="_blank" rel="noopener">Buy</a>`
          : "";
        return `
          <tr style="--i:${i}">
            <td class="domain">${base}<span class="tld">${tld}</span></td>
            <td><span class="badge ${r.status}"><span class="dot"></span>${label}</span></td>
            <td class="price">${price}</td>
            <td class="buy">${buy}</td>
          </tr>
        `;
      }

      function buildTable(rows) {
        return `
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Domain</th>
                  <th>Status</th>
                  <th>Price</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                ${rows.map(rowHtml).join("")}
              </tbody>
            </table>
          </div>
        `;
      }

      function buildSkeleton(n) {
        const row = `
          <tr class="skel-row">
            <td><div class="skel w-domain"></div></td>
            <td><div class="skel w-badge"></div></td>
            <td><div class="skel w-price"></div></td>
            <td><div class="skel w-btn"></div></td>
          </tr>
        `;
        return `
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Domain</th>
                  <th>Status</th>
                  <th>Price</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>${row.repeat(n)}</tbody>
            </table>
          </div>
        `;
      }

      function animateCount(el, to, ms = 600) {
        const from = 0;
        const start = performance.now();
        function tick(now) {
          const t = Math.min(1, (now - start) / ms);
          const eased = 1 - Math.pow(1 - t, 3);
          el.textContent = Math.round(from + (to - from) * eased);
          if (t < 1) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      }

      function render(name, results) {
        const visible = availableOnly.checked
          ? results.filter(r => r.status === "available")
          : results;
        const available = results.filter(r => r.status === "available").length;

        summaryEl.innerHTML = `
          <span class="count ${available === 0 ? "zero" : ""}" id="ct">0</span>
          available of <span class="total">${results.length}</span> checked.
        `;
        summaryEl.classList.add("show");
        animateCount(document.getElementById("ct"), available);

        resultsEl.innerHTML = visible.length
          ? buildTable(visible)
          : '<div class="empty">No domains match this filter.</div>';
        return available;
      }

      async function runSuggester(name, tlds, runId) {
        const candidates = variations(name, 12);
        const domains = [];
        for (const c of candidates) for (const t of tlds) domains.push(`${c}.${t}`);

        suggestionsEl.innerHTML = `
          <div class="section-title">Searching variations</div>
          ${buildSkeleton(Math.min(6, candidates.length))}
        `;

        const all = await checkDomains(domains);
        if (runId !== activeRunId) return;

        const available = all.filter(r => r.status === "available");
        if (!available.length) {
          suggestionsEl.innerHTML = `
            <div class="section-title">Try one of these instead</div>
            <div class="empty">Even the variations are all taken. Try a longer or more unusual name.</div>
          `;
          return;
        }
        suggestionsEl.innerHTML = `<div class="section-title">Try one of these instead</div>${buildTable(available)}`;
      }

      function showStatus(msg, loading = false) {
        if (!msg) { statusEl.innerHTML = ""; return; }
        const dots = loading
          ? '<span class="dot-loader"><span></span><span></span><span></span></span>'
          : "";
        statusEl.innerHTML = `${msg}${dots}`;
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const name = nameInput.value.trim().toLowerCase();
        if (!/^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?$/.test(name)) {
          statusEl.innerHTML = '<span class="error">Use 1&ndash;63 letters, digits, or hyphens (no leading or trailing hyphen).</span>';
          return;
        }
        const tlds = tldSelect.value === "all" ? EXTENDED_TLDS : DEFAULT_TLDS;
        const runId = ++activeRunId;

        submitBtn.disabled = true;
        showStatus(`Querying ${tlds.length} TLDs`, true);
        summaryEl.classList.remove("show");
        summaryEl.innerHTML = "";
        resultsEl.innerHTML = buildSkeleton(Math.min(8, tlds.length));
        suggestionsEl.innerHTML = "";

        try {
          const results = await checkDomains(tlds.map(t => `${name}.${t}`));
          if (runId !== activeRunId) return;
          lastResults = { name, results, tlds };
          showStatus("");
          const available = render(name, results);
          if (available === 0) await runSuggester(name, tlds, runId);
        } catch (err) {
          if (runId !== activeRunId) return;
          statusEl.innerHTML = `<span class="error">${err.message}</span>`;
          resultsEl.innerHTML = "";
        } finally {
          if (runId === activeRunId) submitBtn.disabled = false;
        }
      });

      availableOnly.addEventListener("change", () => {
        if (lastResults) render(lastResults.name, lastResults.results);
      });
    </script>
  </body>
</html>
